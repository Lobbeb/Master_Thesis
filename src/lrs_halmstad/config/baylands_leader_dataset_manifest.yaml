world: baylands
output_dir: datasets/baylands_leader_routes

capture:
  uav_name: dji0
  hz: 0.5
  duration_s: 100.0
  save_overlay: false
  save_metadata: true
  save_negative_examples: true
  make_obb: true
  obb_overlay: true
  obb_overwrite: true

startup:
  warmup_s: 6.0
  stop_on_error: false
  scenario_retry_count: 1
  retry_delay_s: 8.0

pose_variations:
  - name: right
    leader_heading_offset_deg: -90.0
    d_target_m: 8.0
    hold_s: 20.0
  - name: right_wide
    leader_heading_offset_deg: -45.0
    d_target_m: 12.0
    hold_s: 20.0
  - name: center_close
    leader_heading_offset_deg: 0.0
    d_target_m: 5.0
    hold_s: 20.0
  - name: left_wide
    leader_heading_offset_deg: 45.0
    d_target_m: 12.0
    hold_s: 20.0
  - name: left
    leader_heading_offset_deg: 90.0
    d_target_m: 8.0
    hold_s: 20.0

scenarios:
  - name: rotundan
    waypoint: rotundan_0
    nav2_goals: rotundan
    uav_pattern: manual
  - name: road_to_west
    waypoint: road_to_west_0
    nav2_goals: road_to_west
    uav_pattern: scripted
  - name: parkinglot_west
    waypoint: parkinglot_west_0
    nav2_goals: parkinglot_west
    uav_pattern: scripted
  - name: road_to_spawn
    waypoint: road_to_spawn_0
    nav2_goals: road_to_spawn
    uav_pattern: manual
  - name: spawn
    waypoint: spawn_0
    nav2_goals: spawn
    uav_pattern: scripted
  - name: road_to_east
    waypoint: road_to_east_0
    nav2_goals: road_to_east
    uav_pattern: scripted
  - name: parkinglot_east
    waypoint: parkinglot_east_0
    nav2_goals: parkinglot_east
    uav_pattern: scripted
  - name: road_to_strip
    waypoint: road_to_strip_0
    nav2_goals: road_to_strip
    uav_pattern: scripted
  - name: strip
    waypoint: strip_0
    nav2_goals: strip
    uav_pattern: scripted
